name: Deploy VSTREAM to GitHub Pages

on:
  push:
    branches:
      - developer  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo 🛎️
        uses: actions/checkout@v3

      - name: Configurar Node.js (solo si usás herramientas como Vite o bundlers)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build el sitio (opcional)
        run: |
          npm install        # solo si usás dependencias
          npm run build      # adaptá esto a tu script de build si tenés

      - name: Deploy a GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # ajustá según tu carpeta final: ./, ./build, ./dist, etc.

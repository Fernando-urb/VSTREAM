<!DOCTYPE html>
<html lang="es">

<head>
  <!-- etiquetas meta  -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=7" />
  <meta name="canal de streaming" content="este es un sitio para ver peliculas y series " />
  <meta name="keywords" content="series, peliculas, suscripcion" />
  <meta name="author" content="Tu Nombre" />
  <meta name="robots" content="index, follow" />
  <!-- bootstraps5.3v  -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
    crossorigin="anonymous"></script>
  <!-- fonawesome  -->

  <script src="https://kit.fontawesome.com/7d1cc8c36e.js" crossorigin="anonymous"></script>
  <!-- aos animation  -->

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <!-- mis estilos  -->

  <link rel="shortcut icon" href="/src/img/logos/logo-principal.png" type="image/x-icon" />
  <link rel="stylesheet" href="./src/styles/styles.css" />

  <title>VSTREAM</title>
</head>

<body class="bg-dark wrap-layout">
  <header class="navbar-">
    <nav class="navbar sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand px-5" href="#">
          <img src="/src/img/logos/logo-principal.png" alt="Logo" width="70" height="50"
            class="d-inline-block align-text-top ">

        </a>
        <a class="d-flex  text-light bg-success rounded  p-2 mx-3" href="#"> Iniciar sesion</a>
      </div>
    </nav>
  </header>
  <main class="main">
    <!-- section hero  -->
    <section class="contain-fluid hero ">
      <div class="div-hero text-light text-center ">
        <div>
          <h1 class="my-2 fs-1">Bienvenidos a </h1>
          <img src="/src/img/logos/logo-principal.png" alt="logo-principal" width="200" height="180">

        </div>
        <h2 class="my-4"> Los mejores éxitos del cine, Series exclusivas y más</h2>
        <p class=" text-light py-3 fs-4 mb-3">Ahorra un 50% en el plan mensual durante 3 meses
        </p>
        <a href="#catalogo" class="text-light bg-success rounded  px-5 py-2 mx-3 ">Registrarse</a>
      </div>



    </section>
    <!-- baner metodos de pago  -->
    <section class="catalogo p-5 text-light relative">
      <h2> plan mensual</h2>

    </section>
    <!-- catalogo peliculas  -->
    <section class="catalogo p-5 text-light relative">
      <h2>Catálogo de Películas</h2>
      <div class="grid-peliculas">
        </div>
    </section>
    <!-- catalogo de series  -->
    <section class="catalogo p-5 text-light relative">
      <h2>Catálogo de series</h2>
      <div class="grid-peliculas">
      </div>
    </section>
    <!-- como y donde ver  -->
    <section class="catalogo p-5 text-light relative">
      <h2>como y donde lo puedo usar</h2>
      <div class="grid-peliculas">
      </div>
    </section>

  </main>

  <footer class="footer bg-light">
    <p class="text-dark">&copy; 2025 CineVerse. Todos los derechos reservados.</p>
  </footer>



  <!-- aos animation  -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
  <script>
    window.addEventListener('scroll', () => {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

  </script>
</body>

</html>

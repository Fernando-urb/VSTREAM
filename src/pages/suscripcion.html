<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscribirme | VStream</title>
</head>
<body>
    <main class="suscripcion">
        <div class="container-suscripcion">        
            <h3>Suscribete!</h3>
            <form class="form">
                    <label for="name">
                    </label>
                    <input type="text" id="name" required placeholder="Nombre">
                    <label for="apellido">
                    </label>
                    <input type="text" id="apellido" required placeholder="Apellido">
                    <label for="email">
                    </label>
                    <input type="email" id="email" placeholder="Correo Electrónico"> 
                    <label for="password">
                    </label>
                    <input type="password" id="password" placeholder="Contraseña">     
                    <label for="password2">
                    </label>
                    <input type="password2" id="mail" placeholder="Repetir Contraseña"> 
                    <label for="terminos">Sí, me gustaría recibir comunicaciones de marketing, novedades y actualizaciones, ofertas especiales y otra información de VStream. Puedo darme de baja en cualquier momento.</label>
                    <input type="checkbox" id="terminos">

                    <p>Al hacer clic en "Aceptar y Continuar", usted confirma que ha leído y esta de acuerdo con los Términos de Uso y acepta nuestra Política de Privacidad.</p>
                    
                    <a href="#" class="boton-enviar">Aceptar y continuar</a> 

                    <a class="volver" href="#">
                    ↩ Volver</a>  
                </form>
            </div>          
    </main>
</body>
</html>

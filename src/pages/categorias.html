<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vstreams</title>

     <!-- bootstraps5.3v  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <!-- fonawesome  -->
    <script src="https://kit.fontawesome.com/7d1cc8c36e.js" crossorigin="anonymous"></script>
    <!-- aos animation  -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <!-- mis estilos  -->
    <link rel="shortcut icon" href="/src/img/logos/logo-principal.png" type="image/x-icon" />
    <link rel="stylesheet" href="/src/styles/styles.css">
    <title>VSTREAM</title>
</head>
<body class="bg-dark body-inicio ">
    <div class="opacity-body">
        <header class="header sticky-top">
            <nav class=" navbar-expand-lg navbar-inicio">
                <div class="navbar-inicio py-2">
                    <div class="logo_vstreams">
                        <a href="/src/pages/categorias.html"><img src="/src/img/logos/logo-v-1.png" alt=""></a>
                    </div>

                    <div class="peli-series">
                        <button class="efec-cursor"><a href="">peliculas</a></button>
                        <button class="efec-cursor"><a href="">series</a></button>
                    </div>

                    <form class="buscador-container" role="search" aria-label="Buscar contenido">

                        <label for="search" class="visually-hidden">Buscar</label>
                        <input type="text" id="search" name="search" placeholder="Buscar..." class="buscar-input">
                        <button type="submit" class="buscar-button" aria-label="Buscar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        </button>

                    </form>

                </div>
            </nav>
        </header>

        <main>
            <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active p-4" data-bs-interval="10000">
                    <img src="/pexels-david-coleman-55953153-8435283.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item" data-bs-interval="2000">
                    <img src="/pexels-edurawpro-32060022.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                    <img src="/pexels-solyartphotos-32899076.jpg" class="d-block w-100" alt="...">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>

            <div id="carouselExampleDark" class="carousel carousel-dark slide">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
                
                <div class="carousel-inner">
                    <div class="carousel-item w-100 active" data-bs-interval="10000">
                    <img src="/pexels-edurawpro-32060022.jpg" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>First slide label</h5>
                        <p>Some representative placeholder content for the first slide.</p>
                    </div>
                    </div>
                    <div class="carousel-item" data-bs-interval="2000">
                    <img src="/pexels-solyartphotos-32899076.jpg" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Second slide label</h5>
                        <p>Some representative placeholder content for the second slide.</p>
                    </div>
                    </div>
                    <div class="carousel-item">
                    <img src="/pexels-david-coleman-55953153-8435283.jpg" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Third slide label</h5>
                        <p>Some representative placeholder content for the third slide.</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
            </div>
            
        </main>

        <footer>
            
        </footer>

    <!-- aos animation  -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>

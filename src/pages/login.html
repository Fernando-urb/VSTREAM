<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | VStream</title>
    <link rel="stylesheet" href="/src/styles/styles.css">
    <link rel="stylesheet" href="/src/styles/Login-form.css">
</head>
<body>
  <header>
    <img src="/src/img/logos/logo-principal.png" alt="Logo VStream" class="logo-login">
  </header>

  <main class="main-login">
    <section class="contenedor-login">
      <h1 class="titulo-login">Iniciar sesión</h1>
      <form class="form-login">
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>

        <a href="#" class="boton-enviar">Iniciar sesión</a>

        <div class="olvido-contraseña-login">
          <a href="#">¿Olvidaste la contraseña?</a>
        </div>

        <div class="recuerdame-check-login">
          <input type="checkbox" id="recuerdame">
          <label for="recuerdame">Recordarme</label>
        </div>
      </form>
    </section>
  </main>
</body>
</html>

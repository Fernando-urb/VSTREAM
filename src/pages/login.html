<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | VStream</title>
    <link rel="stylesheet" href="/src/styles/styles.css">
    <link rel="stylesheet" href="/src/styles/Login-form.css">
</head>
<body>
  <main class="login-main">
  <!-- <div class="logo"><img src="/src/img/logos/logo-v-1.png" alt="VStream logo" /></div> -->
  <div class="logo">
  <a href="/index.html">
    <img src="/src/img/logos/logo-v-1.png" alt="VStream logo" />
  </a>
  </div>

  <section class="login-form">
    <h1>Iniciar sesión</h1>
    <form>
      <input type="email" placeholder="Correo electrónico" required />
      <input type="password" placeholder="Contraseña" required />
      <button type="submit">Iniciar sesión</button>
      <div class="options">
        <label><input type="checkbox" /> Recordarme</label>
        <a href="#">¿Olvidaste la contraseña?</a>
      </div>
    </form>
    <div class="extra">
      <p>¿Primera vez en VStream? <a href="suscripcion.html">Suscribite ya.</a></p>
    </div>
  </section>
</main>

</body>
</html>
